name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    needs: secret-scan
    env:
      AI_TEAM_ALLOW_UNENCRYPTED_VAULT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pip audit
        run: pip-audit
      - name: Bandit
        run: bandit -c pyproject.toml -r core agents utils -ll -q
      - name: Mypy
        run: >
          mypy core agents utils
          --ignore-missing-imports --explicit-package-bases --follow-imports=silent
          --no-error-summary
        continue-on-error: true
      - name: Pytest
        run: pytest
